<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background: #111;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* tablero es un grid de 20x20 celdas */
    .board {
      display: grid;
      grid-template-columns: repeat(20, 24px);
      grid-template-rows:    repeat(20, 24px);
      border: 2px solid #444;
      position: relative;
    }

    .cell       { width: 24px; height: 24px; background: #1c1c1c; }  /* celdas vacías */
    .snake-head { background: #4ade80; } /* la cabeza verde claro */
    .snake-body { background: #16a34a; } /* el cuerpo verde oscuro */
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  const { useState, useEffect, useRef } = React;  //esto se va a usar para manejar el estado y los efectos secundarios entonces ya no se va a usar React.useState, React.useEffect, etc cada vez.

  const ROWS = 20;
  const COLS = 20;

  // Son direcciones opuestas ya que  no se puede ir hacia atras
  const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };

  // Cuanto se mueve la cabeza segun la direccion
  const MOVES = {
    UP:    [-1,  0],
    DOWN:  [ 1,  0],
    LEFT:  [ 0, -1],
    RIGHT: [ 0,  1],
  };

  // --- Snake------------
  // Recibe los segmentos como prop y le dice al Board que celdas pintar.
  // Este componente no renderiza nada por si mismo.
  function Snake({ segments }) {
    return null;
  }

  // ----- Board --------
  // Dibuja el tablero celda por celda.
  // va a recibir a  snake (array de [fila,col]) y decide que clase CSS poner en cada celda.
  function Board({ snake }) {
    // Convertimos la serpiente a un Set de strings osea  "fila,col" para buscar rapido
    const snakeSet = new Set(snake.map(([r, c]) => `${r},${c}`));
    const headKey  = `${snake[0][0]},${snake[0][1]}`; // primer segmento va a ser la cabeza

    const cells = [];
    for (let r = 0; r < ROWS; r++) { //  por fila
      for (let c = 0; c < COLS; c++) { //  por columna
        const key = `${r},${c}`; // clave para esta celda
        let cls = 'cell'; 
        if (key === headKey)        cls += ' snake-head'; // si es la cabeza, clase de cabeza
        else if (snakeSet.has(key)) cls += ' snake-body';
        cells.push(<div key={key} className={cls} />);
      }
    }

    return (
      <div className="board">
        {cells}
        {}
      </div>
    );
  }

  //  ----------Game ----------------
  // Es el contenedor principal ya que tiene todo el estado y la logica del juego.
  function Game() {
    // La serpiente es un array de [fila, col]. El índice 0 pues es la cabeza.
    const [snake,     setSnake]     = useState([[10,12],[10,11],[10,10]]);
    const [direction, setDirection] = useState('RIGHT');

    // Los refs son  realmente necesarios para que el interval siempre vea los valores mas recientes.
    // ya que sin los Refs snake y direction se "congelan" en su valor inicial dentro del interval.
    const snakeRef = useRef(snake);
    const dirRef   = useRef(direction);
    useEffect(() => { snakeRef.current = snake;     }, [snake]);
    useEffect(() => { dirRef.current   = direction; }, [direction]);

    // Ahora el teclad para justamente cambiar la dirección 
    useEffect(() => {
      const handler = (e) => {
        const map = {
          ArrowUp:'UP', ArrowDown:'DOWN',
          ArrowLeft:'LEFT', ArrowRight:'RIGHT'
        };
        const dir = map[e.key];
        if (!dir) return;
        e.preventDefault(); // evita que las flechas hagan un scroll
        // Esto para no permitir ir en direccion opuesta ya que chocaria consigo misma
        setDirection(prev => OPPOSITE[prev] === dir ? prev : dir);
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    }, []);

    //  bucle del juego que se ejecuta cada 150ms para mover a la snake
    useEffect(() => {
      const interval = setInterval(() => {
        const s = snakeRef.current;
        const [dr, dc] = MOVES[dirRef.current];
        const newHead  = [s[0][0] + dr, s[0][1] + dc];

        //Se ve que la snake se mueve
        // El movimiento se basa en que agrega nueva cabeza al frente y  quita el ultimo segmento del array
        setSnake([newHead, ...s.slice(0, -1)]);
      }, 150);

      return () => clearInterval(interval); // limpieza al desmontar o cambiar de direccion
    }, []);

    return (
      <div>
        <Board snake={snake}>
          <Snake segments={snake} />
        </Board>
      </div>
    );
  }

  // ---- App ----------
  function App() {
    return <Game />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
