<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background: #111;
      color: white;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* tablero es un grid de 20x20 celdas */
    .board {
      display: grid;
      grid-template-columns: repeat(20, 24px);
      grid-template-rows:    repeat(20, 24px);
      border: 2px solid #444;
      position: relative;
    }

    .cell       { width: 24px; height: 24px; background: #1c1c1c; }  /* celdas vacías */
    .snake-head { background: #4ade80; } /* la cabeza verde claro */
    .snake-body { background: #16a34a; } /* el cuerpo verde oscuro */
    .food { background: skyblue; border-radius: 50%; } /* comidita va  a estar en azul y tambien va a ser circular  */
    .game    { display:flex; flex-direction:column; align-items:center; gap:10px; } /* contenedor del juego para centrar y separar el tablero del puntaje */
    .score   { font-size: 20px; } 

    .overlay { /* pantalla de game over o mensaje de inicio */
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.8);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
    }
    .overlay h2 { margin: 0; font-size: 24px; }
    .overlay p  { margin: 0; color: #aaa; }

    button { /* estilo de boton para reiniciar o empezar el juego */
        padding: 8px 20px; font-size: 14px; font-family: monospace;
        cursor: pointer; background: #222; color: white;
        border: 2px solid #555; border-radius: 4px;
    }
    button:hover { background: #333; }
    .hint { color: #555; font-size: 12px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  const { useState, useEffect, useRef } = React;  //esto se va a usar para manejar el estado y los efectos secundarios entonces ya no se va a usar React.useState, React.useEffect, etc cada vez.

  const ROWS = 20;
  const COLS = 20;

  // Son direcciones opuestas ya que  no se puede ir hacia atras
  const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };

  // Cuanto se mueve la cabeza segun la direccion
  const MOVES = {
    UP:    [-1,  0],
    DOWN:  [ 1,  0],
    LEFT:  [ 0, -1],
    RIGHT: [ 0,  1],
  };

  // --- Snake------------
  // Recibe los segmentos como prop y le dice al Board que celdas pintar.
  // Este componente no renderiza nada por si mismo.
  function Snake({ segments }) {
    return null;
  }

  // ----- Board --------
  // Dibuja el tablero celda por celda.
  // va a recibir a  snake (array de [fila,col]) y decide que clase CSS poner en cada celda.
  function Board({ snake, food, children }) {
    // Convertimos la serpiente a un Set de strings osea  "fila,col" para buscar rapido
    const snakeSet = new Set(snake.map(([r, c]) => `${r},${c}`));
    const headKey  = `${snake[0][0]},${snake[0][1]}`; // primer segmento va a ser la cabeza
    const foodKey  = `${food[0]},${food[1]}`; // la comida tambien se va a convertir a string para comparar

    const cells = [];
    for (let r = 0; r < ROWS; r++) { //  por fila
      for (let c = 0; c < COLS; c++) { //  por columna
        const key = `${r},${c}`; // clave para esta celda
        let cls = 'cell'; 
        if (key === headKey)        cls += ' snake-head'; // si es la cabeza, clase de cabeza
        else if (snakeSet.has(key)) cls += ' snake-body'; // si esta en el set de la snake, clase de cuerpo
        else if (key === foodKey)   cls += ' food';       // si es la comida, clase de comida
        cells.push(<div key={key} className={cls} />);
      }
    }

    return (
      <div className="board">
        {cells}
        {children}
      </div>
    );
  }


    // ---- randomFood ---------
    // Genera una posición aleatoria que no este ocupada por la snake en ese momento
    function randomFood(snake) {
        let pos;
        do {
            pos = [
                Math.floor(Math.random() * ROWS),
                Math.floor(Math.random() * COLS)
            ];
        } while (snake.some(([r, c]) => r === pos[0] && c === pos[1]));
        return pos;
    }


    // ---- Food -------
    // Componente logico que realmente  no renderiza nada ua que Board usa su posicion para pintar la celda.
    function Food({ position }) {
        return null;
    }

    //-----Score------
    // Recibe el puntaje como prop y solo lo muestra por lo que  no sabe nada del juego.
    function Score({ score, level }) {
        return (
            <div className="score">
                Score: <b>{score}</b> | Level: <b>{level}</b>  
            </div>
        );
    }


    // ------ GameOverScreen -------
    // Se va  muestrar por  encima del tablero cuando el player pierde.
    // Va a recibir el puntaje final y una funcion para reiniciar.
    function GameOverSc({ score, onRestart }) {
        return (
            <div className="overlay">
                <h2>Game Over Bruh </h2>
                <p>Score: <b>{score}</b></p>
                <button onClick={onRestart}>Reiniciar</button>
            </div>
        );
    }

    // ----- StartScreen ------
    // Se muestra antes de que empiece el juego.
    function StartScreen({ onStart }) {
        return (
            <div className="overlay">
                <h2> Snake Game !!</h2>
                <p>Usa las flechas del teclado</p>
                <button onClick={onStart}>Jugar</button>
            </div>
        );
    }


  //  ----------Game ----------------
  // Es el contenedor principal ya que tiene todo el estado y la logica del juego.
  function Game() {
    // La serpiente es un array de [fila, col]. El índice 0 pues es la cabeza.
    const [snake,     setSnake]     = useState([[10,12],[10,11],[10,10]]);
    const [food,      setFood]      = useState([5, 10]); // posición inicial de food
    const [direction, setDirection] = useState('RIGHT');
    const [score,     setScore]     = useState(0);
    const [gameOver,  setGameOver]  = useState(false);
    const [status, setStatus] = useState('inicio'); // 'xd 'esperando inicio | 'running' = jugando | 'over' = terminó

    // Los refs son  realmente necesarios para que el interval siempre vea los valores mas recientes.
    // ya que sin los Refs snake y direction se "congelan" en su valor inicial dentro del interval.
    const snakeRef = useRef(snake);
    const dirRef   = useRef(direction);
    const foodRef  = useRef(food); //ref para la comida
    const scoreRef   = useRef(score);
    const gameOverRef= useRef(gameOver);
    const statusRef = useRef(status);


    useEffect(() => { snakeRef.current = snake;     }, [snake]);
    useEffect(() => { dirRef.current   = direction; }, [direction]);
    useEffect(() => { foodRef.current  = food;      }, [food]);
    useEffect(() => { scoreRef.current    = score;    }, [score]);
    useEffect(() => { gameOverRef.current = gameOver; }, [gameOver]);
    useEffect(() => { statusRef.current = status; }, [status]);




    // El nivel sube cada 5 puntos y aumenta la velocidad
    const getSpeed = (score) => Math.max(80, 150 - Math.floor(score / 5) * 20);
    const level = Math.floor(score / 5) + 1; // nivel basado en el puntaje

    // TECLADO: Ahora el teclad para justamente cambiar la dirección 
    useEffect(() => {
      const handler = (e) => {
        const map = {
          ArrowUp:'UP', ArrowDown:'DOWN',
          ArrowLeft:'LEFT', ArrowRight:'RIGHT'
        };
        const dir = map[e.key];
        if (!dir) return;
        e.preventDefault(); // evita que las flechas hagan un scroll
        // Esto para no permitir ir en direccion opuesta ya que chocaria consigo misma
        setDirection(prev => OPPOSITE[prev] === dir ? prev : dir);
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    }, []);

    // LOOP: bucle del juego que se ejecuta cada 150ms para mover a la snake
    useEffect(() => {
      const interval = setInterval(() => {

        if (statusRef.current !== 'running') return; // si ya se acabo el juego, no hacer nada
        const s = snakeRef.current;
        const [dr, dc] = MOVES[dirRef.current];
        const newHead  = [s[0][0] + dr, s[0][1] + dc];

        // Colision con paredes: si la nueva cabeza esta fuera del tablero, se acaba el juego
        if (newHead[0] < 0 || newHead[0] >= ROWS ||
            newHead[1] < 0 || newHead[1] >= COLS) {
            setStatus('over');
            return;
        }
        //Colision con el cuerpo: si la nueva cabeza coincide con alguna parte del cuerpo, se acaba el juego
        // slice(0,-1) excluye la cola porque ella se va a mover justo al momento
        if (s.slice(0,-1).some(([r,c]) => r === newHead[0] && c === newHead[1])) {
            setStatus('over');
            return;
        }


        //Se ve que la snake se mueve
        // El movimiento se basa en que agrega nueva cabeza al frente y  quita el ultimo segmento del array
        
      // comprobar si la cabeza llego a donde esta la comida
        const ateFood = newHead[0] === foodRef.current[0]
                   && newHead[1] === foodRef.current[1];

        if (ateFood) {
            const newSnake = [newHead, ...s]; // aqui es donde crece que agrega cabeza pero no quita cola
            setSnake(newSnake);
            setScore(prev => prev + 1); // aumenta el puntaje 
            setFood(randomFood(newSnake));    // genera nueva comida en otro lugar
        } else {
            setSnake([newHead, ...s.slice(0, -1)]); // mueve normal
        }
        }, getSpeed(score)); // la velocidad depende del puntaje

      return () => clearInterval(interval); // limpieza al desmontar o cambiar de direccion
    }, [status, score]); // se vuelve a ejecutar el efecto si cambia el estado del juego o el puntaje para ajustar la velocidad

    // Se reinicia el juego- valores por default
    
    const startGame = () => {
        const s = [[10,12],[10,11],[10,10]];
        setSnake(s);
        setFood(randomFood(s));
        setDirection('RIGHT');
        setScore(0);
        setStatus('running');
    };



    return (
    <div className="game">
      <Score score={score} level={level} />
      <Board snake={snake} food={food}>
        <Snake segments={snake} />
        <Food  position={food} />
        {status === 'inicio' && <StartScreen onStart={startGame} />}
        {status === 'over' && <GameOverSc score={score} onRestart={startGame} />}
      </Board>
      <p className="hint">usa las FLECHAS TECLADO para moverte -  el nivel sube cada 5 puntos</p>
    </div>
  );
}




    // ---- App ----------
    function App() {
        return <Game />;
    }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
